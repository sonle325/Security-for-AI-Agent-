<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Runtime Security — Incident Dashboard</title>
<meta name="description" content="AI Runtime Security EDR - Incident Graph Dashboard for SOC Investigation">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #161b22, #1c2333);
    border-bottom: 1px solid #30363d;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header h1 { font-size: 18px; color: #f0f6fc; font-weight: 600; }
  .badge {
    background: #388bfd22;
    border: 1px solid #388bfd55;
    color: #58a6ff;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: #3fb950;
    border-radius: 50%;
    animation: blink 1.5s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .stats {
    display: flex;
    gap: 14px;
    padding: 16px 28px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 20px;
    flex: 1;
    min-width: 130px;
  }
  .stat-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
  .c-total  .value { color: #58a6ff; }
  .c-crit   .value { color: #f85149; }
  .c-high   .value { color: #d29922; }
  .c-prompt .value { color: #bc8cff; }
  .c-tool   .value { color: #f78166; }
  .c-data   .value { color: #d29922; }

  .filter-bar {
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .filter-bar span { font-size: 11px; color: #6e7681; }
  .filter-bar button {
    background: #21262d; border: 1px solid #30363d;
    color: #c9d1d9; padding: 4px 12px; border-radius: 6px;
    font-size: 11px; cursor: pointer; transition: all .15s;
  }
  .filter-bar button:hover, .filter-bar button.active {
    background: #388bfd22; border-color: #388bfd; color: #58a6ff;
  }

  /* Tab bar */
  .tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid #30363d; background: #161b22;
  }
  .tab-btn {
    padding: 8px 18px; font-size: 12px; cursor: pointer;
    color: #8b949e; border: none; background: transparent;
    border-bottom: 2px solid transparent; transition: all .15s;
  }
  .tab-btn:hover { color: #c9d1d9; }
  .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

  .main { display: flex; height: calc(100vh - 230px); }

  .list-panel {
    width: 400px; border-right: 1px solid #30363d;
    overflow-y: auto; flex-shrink: 0;
  }
  .list-panel h2 {
    padding: 10px 16px; font-size: 12px; color: #8b949e;
    background: #161b22; border-bottom: 1px solid #30363d;
    position: sticky; top: 0; z-index: 1;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .incident-item {
    padding: 11px 16px; border-bottom: 1px solid #21262d;
    cursor: pointer; transition: background .12s;
  }
  .incident-item:hover { background: #161b22; }
  .incident-item.selected { background: #1c2333; border-left: 3px solid #388bfd; }
  .inc-id { font-size: 12px; font-weight: 600; color: #58a6ff; }
  .inc-type { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .inc-ts { font-size: 11px; color: #6e7681; margin-top: 2px; }
  .inc-session { font-size: 10px; color: #6e7681; font-family: monospace; }

  .sev-badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .sev-CRITICAL { background:#f8514922; color:#f85149; border:1px solid #f8514944; }
  .sev-HIGH     { background:#d2992222; color:#d29922; border:1px solid #d2992244; }
  .sev-MEDIUM   { background:#388bfd22; color:#58a6ff; border:1px solid #388bfd44; }
  .sev-LOW      { background:#3fb95022; color:#3fb950; border:1px solid #3fb95044; }
  .sev-         { background:#30363d;   color:#8b949e; border:1px solid #30363d;   }

  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #graph-container {
    flex: 1; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at center, #161b22 0%, #0d1117 70%);
  }
  svg#graph { width: 100%; height: 100%; }

  #empty-msg {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center; color: #30363d; pointer-events: none;
  }
  #empty-msg div:first-child { font-size: 48px; }
  #empty-msg div:last-child  { font-size: 14px; margin-top: 8px; }

  .node-Incident    circle { fill: #f85149; stroke: #f8514966; stroke-width: 2; }
  .node-AIAgent     circle { fill: #58a6ff; stroke: #388bfd66; stroke-width: 2; }
  .node-Process     circle { fill: #3fb950; stroke: #3fb95066; stroke-width: 2; }
  .node-Endpoint    circle { fill: #d29922; stroke: #d2992266; stroke-width: 2; }
  .node-PromptEvent circle { fill: #bc8cff; stroke: #bc8cff66; stroke-width: 2; }
  .node-NetworkConn circle { fill: #f78166; stroke: #f7816666; stroke-width: 2; }
  .node-ToolAnomaly circle { fill: #f78166; stroke: #f7816666; stroke-width: 2; }
  .node-DataLeak    circle { fill: #d29922; stroke: #d2992266; stroke-width: 2; }
  .node-label { fill: #c9d1d9; font-size: 10px; text-anchor: middle; pointer-events: none; }
  .edge-line  { stroke: #30363d; stroke-width: 1.5; marker-end: url(#arrow); }
  .edge-label { fill: #6e7681; font-size: 9px; text-anchor: middle; }

  /* Timeline */
  #timeline-container {
    flex: 1; position: relative; overflow-y: auto; overflow-x: hidden;
    background: #0d1117; padding: 20px; display: none;
  }
  .tl-title { font-size: 14px; color: #f0f6fc; font-weight: 600; margin-bottom: 16px; }
  .tl-item {
    display: flex; gap: 14px; margin-bottom: 6px; position: relative;
  }
  .tl-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px; position: relative; z-index: 1;
  }
  .tl-line {
    position: absolute; left: 5px; top: 16px; width: 2px;
    background: #30363d; height: calc(100% + 6px);
  }
  .tl-item:last-child .tl-line { display: none; }
  .tl-content { flex: 1; }
  .tl-time { font-size: 10px; color: #6e7681; font-family: monospace; }
  .tl-label { font-size: 12px; color: #c9d1d9; margin-top: 2px; }
  .tl-detail { font-size: 11px; color: #8b949e; margin-top: 1px; }
  .dot-CRITICAL { background: #f85149; box-shadow: 0 0 6px #f8514988; }
  .dot-HIGH     { background: #d29922; box-shadow: 0 0 6px #d2992288; }
  .dot-MEDIUM   { background: #58a6ff; }
  .dot-LOW      { background: #3fb950; }

  /* Attack Chain */
  #chain-container {
    flex: 1; position: relative; overflow-y: auto;
    background: #0d1117; padding: 20px; display: none;
  }
  .chain-title { font-size: 14px; color: #f0f6fc; font-weight: 600; margin-bottom: 16px; }
  .chain-node {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 4px; position: relative;
  }
  .chain-node .cn-id { color: #58a6ff; font-weight: 600; font-size: 12px; }
  .chain-node .cn-type { color: #8b949e; font-size: 11px; }
  .chain-node .cn-action { color: #c9d1d9; font-size: 11px; margin-top: 2px; }
  .chain-arrow { text-align: center; color: #30363d; font-size: 18px; line-height: 1; }
  .chain-empty { color: #6e7681; font-size: 12px; text-align: center; padding: 30px; }

  .detail-panel {
    height: 240px; border-top: 1px solid #30363d;
    background: #161b22; padding: 14px 18px;
    overflow-y: auto; font-size: 12px; line-height: 1.6;
  }
  .detail-panel h3 { color: #f0f6fc; margin-bottom: 8px; font-size: 13px; }
  .kv { display: flex; gap: 12px; margin-bottom: 3px; }
  .kv .k { color: #8b949e; min-width: 140px; }
  .kv .v { color: #c9d1d9; word-break: break-all; }
  
  .mitre-tag {
    display: inline-block; background: #21262d; border: 1px solid #30363d;
    color: #8b949e; padding: 2px 8px; border-radius: 4px; font-size: 10px;
    margin-right: 4px; margin-bottom: 4px; cursor: default;
  }
  .mitre-tag:hover { border-color: #58a6ff; color: #c9d1d9; }
  
  .process-tree {
    font-family: monospace; font-size: 11px; background: #0d1117;
    padding: 8px; border-radius: 6px; border: 1px solid #30363d;
    margin-top: 4px; line-height: 1.4; color: #c9d1d9;
  }
  .process-tree .hl { color: #3fb950; font-weight: bold; }
  .process-tree .net { color: #f78166; }
</style>
</head>
<body>

<div class="header">
  <div class="live-dot"></div>
  <h1>🛡️ AI Runtime Security — Incident Dashboard</h1>
  <span class="badge">LIVE</span>
  <span class="badge" id="update-time">--</span>
</div>

<div class="stats">
  <div class="stat-card c-total">
    <div class="label">Tổng Incident</div>
    <div class="value" id="s-total">0</div>
  </div>
  <div class="stat-card c-crit">
    <div class="label">Critical</div>
    <div class="value" id="s-crit">0</div>
  </div>
  <div class="stat-card c-high">
    <div class="label">High</div>
    <div class="value" id="s-high">0</div>
  </div>
  <div class="stat-card c-prompt">
    <div class="label">Prompt Injection</div>
    <div class="value" id="s-prompt">0</div>
  </div>
  <div class="stat-card c-tool">
    <div class="label">Tool Anomaly</div>
    <div class="value" id="s-tool">0</div>
  </div>
  <div class="stat-card c-data">
    <div class="label">Data Disclosure</div>
    <div class="value" id="s-data">0</div>
  </div>
</div>

<div class="filter-bar">
  <span>Lọc:</span>
  <button class="active" onclick="setFilter('ALL', this)">Tất cả</button>
  <button onclick="setFilter('PROMPT_INJECTION', this)">Prompt Injection</button>
  <button onclick="setFilter('TOOL_ANOMALY', this)">Tool Anomaly</button>
  <button onclick="setFilter('DATA_DISCLOSURE', this)">Data Disclosure</button>
  <button onclick="setFilter('CORRELATED', this)">Correlated</button>
  <button onclick="setFilter('ORPHAN_SUSPICIOUS', this)">Suspicious</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('graph', this)">🕸️ Incident Graph</button>
  <button class="tab-btn" onclick="switchTab('timeline', this)">📊 Timeline</button>
  <button class="tab-btn" onclick="switchTab('chain', this)">⛓️ Attack Chain</button>
</div>

<div class="main">
  <div class="list-panel">
    <h2>Incidents (<span id="list-count">0</span>)</h2>
    <div id="incident-list"></div>
  </div>

  <div class="right-panel">
    <div id="graph-container">
      <svg id="graph">
        <defs>
          <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
          </marker>
        </defs>
        <g id="graph-root"></g>
      </svg>
      <div id="empty-msg">
        <div>🕸️</div>
        <div>Chọn Incident để xem đồ thị</div>
      </div>
    </div>

    <div id="timeline-container"></div>
    <div id="chain-container"></div>

    <div class="detail-panel" id="detail-panel">
      <div style="color:#6e7681">Chọn một Incident để xem chi tiết...</div>
    </div>
  </div>
</div>

<script>
let allIncidents = [];
let selectedId   = null;
let currentFilter = 'ALL';
let currentTab    = 'graph';

const TYPE_LABEL = {
  PROMPT_INJECTION: '💉 Prompt Injection',
  TOOL_ANOMALY:     '🔧 Tool Anomaly',
  DATA_DISCLOSURE:  '🔓 Data Disclosure',
  CORRELATED:       '🔗 Correlated',
  ORPHAN_SUSPICIOUS:'⚠️ Suspicious',
};

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('graph-container').style.display   = tab === 'graph'    ? '' : 'none';
  document.getElementById('timeline-container').style.display = tab === 'timeline' ? 'block' : 'none';
  document.getElementById('chain-container').style.display    = tab === 'chain'    ? 'block' : 'none';
  if (selectedId) select(selectedId);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filtered() {
  return currentFilter === 'ALL'
    ? allIncidents
    : allIncidents.filter(i => i.type === currentFilter);
}

function renderList() {
  const items = filtered();
  document.getElementById('list-count').textContent = items.length;
  const container = document.getElementById('incident-list');
  container.innerHTML = '';
  [...items].reverse().forEach(inc => {
    const div = document.createElement('div');
    div.className = 'incident-item' + (inc.id === selectedId ? ' selected' : '');
    div.onclick = () => select(inc.id);
    const ts = inc.timestamp ? new Date(inc.timestamp).toLocaleTimeString('vi-VN') : '--';
    const sid = inc.session_id ? `<div class="inc-session">🔗 ${inc.session_id}</div>` : '';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="inc-id">${inc.id}</span>
        <span class="sev-badge sev-${inc.severity || ''}">${inc.severity || '?'}</span>
      </div>
      <div class="inc-type">${TYPE_LABEL[inc.type] || inc.type}</div>
      <div class="inc-ts">🤖 ${inc.agent} · ${ts}</div>
      ${sid}
    `;
    container.appendChild(div);
  });
}

function select(id) {
  selectedId = id;
  const inc = allIncidents.find(i => i.id === id);
  if (!inc) return;
  renderList();
  document.getElementById('empty-msg').style.display = 'none';
  if (currentTab === 'graph')    drawGraph(inc);
  if (currentTab === 'timeline') drawTimeline(inc);
  if (currentTab === 'chain')    drawChain(inc);
  showDetail(inc);
}

function showDetail(inc) {
  let mitreHtml = '—';
  if (inc.mitre_tactics && inc.mitre_tactics.length > 0) {
    mitreHtml = inc.mitre_tactics.map(t => `<span class="mitre-tag">${t}</span>`).join('');
  }

  let treeHtml = '';
  if (inc.process) {
    let parent = inc.parent_process ? inc.parent_process.split('\\').pop() : 'Unknown_Parent.exe';
    let child = inc.process.split('\\').pop();
    treeHtml = `<div class="process-tree">
      <div>${parent}</div>
      <div> └── <span class="hl">${child}</span></div>`;
    if (inc.network_dest) {
      treeHtml += `<div>      └── <span class="net">Network: ${inc.network_dest}</span></div>`;
    }
    if (inc.registry_key) {
      treeHtml += `<div>      └── <span class="net">Reg: ${inc.registry_key.split('\\').pop()}</span></div>`;
    }
    treeHtml += `</div>`;
  }

  const rows = [
    ['Incident ID', inc.id],
    ['Loại', inc.type],
    ['Severity', inc.severity],
    ['Session ID', inc.session_id || '—'],
    ['AI Agent', inc.agent],
    ['Action', inc.action],
    ['MITRE ATT&CK', mitreHtml],
    ['Timestamp', inc.timestamp],
    ['Process Tree', treeHtml || '—'],
    ['Command Line', inc.cmdline || '—'],
    ['Event ID', inc.event_id || '—'],
    ['Prompt Score', inc.prompt_score > 0 ? `${inc.prompt_score}/100 (${inc.prompt_risk})` : '—'],
    ['Tool Risk', inc.tool_risk || '—'],
    ['Data Risk', inc.data_risk || '—'],
  ];
  document.getElementById('detail-panel').innerHTML =
    `<h3>📋 ${inc.id}</h3>` +
    rows.map(([k,v]) => `<div class="kv"><span class="k">${k}</span><span class="v" style="${k==='Process Tree'||k==='MITRE ATT&CK'?'flex:1':''}">${v}</span></div>`).join('');
}

/* ==================== GRAPH ==================== */
function drawGraph(inc) {
  const root = document.getElementById('graph-root');
  const svg  = document.getElementById('graph');
  root.innerHTML = '';
  const W = svg.clientWidth || 700, H = svg.clientHeight || 400;
  const cx = W / 2, cy = H / 2;

  const nodes = [
    { id:'incident', type:'Incident',  label: inc.id,              r:36, x:cx,       y:cy       },
    { id:'agent',    type:'AIAgent',   label: inc.agent || 'Agent', r:28, x:cx-220,   y:cy-80    },
    { id:'endpoint', type:'Endpoint',  label: 'Endpoint',           r:24, x:cx+220,   y:cy-80    },
  ];
  if (inc.process)        nodes.push({ id:'process', type:'Process',     label:(inc.process.split('\\').pop()||'').substring(0,15), r:24, x:cx+60,   y:cy+160 });
  if (inc.prompt_score>0) nodes.push({ id:'prompt',  type:'PromptEvent', label:`Prompt\n${inc.prompt_risk}`, r:22, x:cx-200, y:cy+120 });
  if (inc.tool_risk && inc.tool_risk !== '—') nodes.push({ id:'tool', type:'ToolAnomaly', label:`Tool\n${inc.tool_risk}`, r:22, x:cx-60, y:cy+160 });
  if (inc.data_risk && inc.data_risk !== '—') nodes.push({ id:'data', type:'DataLeak', label:`Data\n${inc.data_risk}`, r:22, x:cx+180, y:cy+140 });
  
  if (inc.network_dest)   nodes.push({ id:'network', type:'NetworkConn', label:inc.network_dest.split(':')[0], r:22, x:cx+200, y:cy+240 });
  if (inc.registry_key)   nodes.push({ id:'registry',type:'Endpoint',    label:'Registry', r:22, x:cx+120, y:cy+260 });

  const edges = [
    { from:'agent', to:'incident', label:'TRIGGERED' },
    { from:'incident', to:'endpoint', label:'ON' },
  ];
  if (inc.process)        edges.push({ from:'incident', to:'process', label:'EXECUTED' });
  if (inc.prompt_score>0) edges.push({ from:'incident', to:'prompt',  label:'PROMPT'   });
  if (inc.tool_risk && inc.tool_risk !== '—') edges.push({ from:'incident', to:'tool', label:'TOOL' });
  if (inc.data_risk && inc.data_risk !== '—') edges.push({ from:'incident', to:'data', label:'LEAK' });
  if (inc.network_dest && inc.process) edges.push({ from:'process', to:'network', label:'CONN' });
  else if (inc.network_dest) edges.push({ from:'incident', to:'network', label:'CONN' });
  if (inc.registry_key) edges.push({ from:'incident', to:'registry', label:'MODIFIED' });

  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));

  // Edges
  edges.forEach(e => {
    const s = nodeMap[e.from], d = nodeMap[e.to];
    if (!s || !d) return;
    const dx = d.x - s.x, dy = d.y - s.y;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    const ux = dx/len, uy = dy/len;
    const x1 = s.x+ux*s.r, y1 = s.y+uy*s.r;
    const x2 = d.x-ux*(d.r+8), y2 = d.y-uy*(d.r+8);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('class','edge-line');
    root.appendChild(line);

    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',(x1+x2)/2); lbl.setAttribute('y',(y1+y2)/2-4);
    lbl.setAttribute('class','edge-label');
    lbl.textContent = e.label;
    root.appendChild(lbl);
  });

  // Nodes
  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class',`node-${n.type}`);
    g.setAttribute('transform',`translate(${n.x},${n.y})`);

    const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('r', n.r);
    c.style.filter = 'drop-shadow(0 2px 10px rgba(0,0,0,0.5))';
    g.appendChild(c);

    n.label.split('\n').forEach((line, i, arr) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('class','node-label');
      t.setAttribute('y', (i-(arr.length-1)/2)*13);
      t.textContent = line;
      g.appendChild(t);
    });

    const sub = document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('class','node-label');
    sub.setAttribute('y', n.r+14);
    sub.setAttribute('fill','#6e7681');
    sub.textContent = n.type;
    g.appendChild(sub);

    root.appendChild(g);
  });
}

/* ==================== TIMELINE ==================== */
function drawTimeline(inc) {
  const container = document.getElementById('timeline-container');

  // Tìm tất cả incidents cùng session
  const sessionId = inc.session_id;
  let chain;
  if (sessionId) {
    chain = allIncidents.filter(i => i.session_id === sessionId)
      .sort((a,b) => new Date(a.timestamp||0) - new Date(b.timestamp||0));
  } else {
    chain = [inc];
  }

  let html = `<div class="tl-title">📊 Timeline ${sessionId ? `(Session: ${sessionId})` : `(${inc.id})`} — ${chain.length} event(s)</div>`;

  chain.forEach((item, idx) => {
    const ts = item.timestamp ? new Date(item.timestamp).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3}) : '--';
    const dotCls = `dot-${item.severity || 'LOW'}`;
    const typeLabel = TYPE_LABEL[item.type] || item.type;
    const cmdPreview = item.cmdline ? item.cmdline.substring(0, 80) + (item.cmdline.length > 80 ? '...' : '') : '';
    const isSelected = item.id === inc.id ? 'border-left: 3px solid #58a6ff;' : '';
    html += `
      <div class="tl-item" style="${isSelected}">
        <div style="position:relative">
          <div class="tl-dot ${dotCls}"></div>
          <div class="tl-line"></div>
        </div>
        <div class="tl-content">
          <div class="tl-time">${ts}</div>
          <div class="tl-label">
            <span class="sev-badge sev-${item.severity||''}">${item.severity||'?'}</span>
            ${item.id} — ${typeLabel}
          </div>
          <div class="tl-detail">🤖 ${item.agent} → ${item.action || 'N/A'}</div>
          ${cmdPreview ? `<div class="tl-detail" style="color:#6e7681;font-family:monospace;font-size:10px">$ ${cmdPreview}</div>` : ''}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

/* ==================== ATTACK CHAIN ==================== */
function drawChain(inc) {
  const container = document.getElementById('chain-container');
  const sessionId = inc.session_id;

  if (!sessionId) {
    container.innerHTML = `
      <div class="chain-title">⛓️ Attack Chain</div>
      <div class="chain-empty">Incident này không có Session ID.<br>Attack Chain chỉ khả dụng khi incidents được gửi qua SDK Client với cùng session.</div>
    `;
    return;
  }

  const chain = allIncidents.filter(i => i.session_id === sessionId)
    .sort((a,b) => new Date(a.timestamp||0) - new Date(b.timestamp||0));

  let html = `<div class="chain-title">⛓️ Attack Chain — Session: ${sessionId}</div>`;

  let chainSteps = [];
  
  // Unpack từng incident thành các bước cụ thể
  chain.forEach(item => {
    // 1. Prompt
    if (item.prompt_score > 0) {
      chainSteps.push({ id: item.id, type: 'Prompt Injection', action: `AI Agent received malicious prompt`, sev: item.prompt_risk || 'HIGH' });
    }
    // 2. Tool
    if (item.tool_risk && item.tool_risk !== '—' || item.action === 'terminal' || item.action === 'execute') {
      chainSteps.push({ id: item.id, type: 'Tool Invocation', action: `Agent called tool: ${item.action}`, sev: item.tool_risk && item.tool_risk !== '—' ? item.tool_risk : 'MEDIUM' });
    }
    // 3. Process
    if (item.process) {
      chainSteps.push({ id: item.id, type: 'Process Execution', action: `Executed: ${item.process.split('\\').pop()}`, sev: item.severity });
    }
    // 4. Network
    if (item.network_dest) {
      chainSteps.push({ id: item.id, type: 'Network Activity', action: `Connected to ${item.network_dest}`, sev: 'HIGH' });
    }
    // 5. Data Disclosure
    if (item.data_risk && item.data_risk !== '—') {
      chainSteps.push({ id: item.id, type: 'Data Disclosure', action: `Sensitive data leaked in AI response`, sev: item.data_risk });
    }
  });

  // Nếu list rỗng thì hiển thị incident cơ bản
  if (chainSteps.length === 0) {
    chain.forEach(item => {
      chainSteps.push({ id: item.id, type: item.type, action: `Agent action: ${item.action}`, sev: item.severity });
    });
  }

  chainSteps.forEach((step, idx) => {
    const isSelected = step.id === inc.id ? 'border-color: #58a6ff;' : '';
    html += `
      <div class="chain-node" style="${isSelected}" onclick="select('${step.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="cn-id">${step.id}</span>
          <span class="sev-badge sev-${step.sev}">${step.sev}</span>
        </div>
        <div class="cn-type">${step.type}</div>
        <div class="cn-action">▸ ${step.action}</div>
      </div>
    `;
    if (idx < chainSteps.length - 1) {
      html += `<div class="chain-arrow">↓</div>`;
    }
  });

  container.innerHTML = html;
}

/* ==================== STATS & FETCH ==================== */
function updateStats(data) {
  document.getElementById('s-total').textContent  = data.length;
  document.getElementById('s-crit').textContent   = data.filter(i=>i.severity==='CRITICAL').length;
  document.getElementById('s-high').textContent   = data.filter(i=>i.severity==='HIGH').length;
  document.getElementById('s-prompt').textContent = data.filter(i=>i.type==='PROMPT_INJECTION').length;
  document.getElementById('s-tool').textContent   = data.filter(i=>i.type==='TOOL_ANOMALY').length;
  document.getElementById('s-data').textContent   = data.filter(i=>i.type==='DATA_DISCLOSURE').length;
}

async function fetchIncidents() {
  try {
    const r = await fetch('/api/incidents');
    allIncidents = await r.json();
    updateStats(allIncidents);
    renderList();
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('vi-VN');
  } catch(e) {}
}

fetchIncidents();
setInterval(fetchIncidents, 2000);
</script>
