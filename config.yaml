# ============================================================
# AI Runtime Security — Cấu hình tập trung
# ============================================================
# Tất cả threshold, credential, whitelist đều ở đây.
# Không hardcode trong source code.
# ============================================================

# --- MCP Security Gateway ---
# Transparent proxy intercept toàn bộ MCP (Model Context Protocol)
# traffic giữa AI Agent và MCP Server.
mcp_gateway:
  enabled: true
  mode: "AUDIT"                  # "MONITOR" | "AUDIT" | "INTERCEPT"
  
  # Ngưỡng điểm risk score (0-100)
  block_threshold: 60            # Áp dụng cho INTERCEPT
  hard_block_threshold: 90       # Áp dụng cho AUDIT (chỉ block cực đoan)
  
  # Hành động khi block
  block_action: "deny"           # "deny" (trả lỗi) | "substitute" (đổi content) | "delay" (chờ 30s)
  
  listen_port: 8765              # Port cho AI Agent kết nối (proxy endpoint)
  upstream_host: "127.0.0.1"
  upstream_port: 8766            # Port thật của MCP Server phía sau
  max_requests_per_minute: 60
  
  # Per-tool overrides (Ghi đè cấu hình cho từng loại tool)
  tool_overrides:
    read_file:
      mode: "MONITOR"            # Đọc file chỉ log, không block để tránh đứt mạch dev
    shell_execute:
      mode: "INTERCEPT"          # Thực thi shell luôn kiểm soát chặt
      block_threshold: 40
    run_command:
      mode: "INTERCEPT"
      block_threshold: 40
      block_action: "delay"      # Delay để human review
      
  blocked_tools:                 # Tool names LUÔN bị block (score=100)
    - "mimikatz"
    - "nc"
  sensitive_paths:               # File paths bị flag khi truy cập
    - ".env"
    - "id_rsa"
    - "credentials"
    - "aws_credentials"
    - "secrets.yml"
  suspicious_domains:            # Domain bị flag trong tool arguments
    - "attacker.com"
    - "evil.com"
    - "c2.attacker.com"

# --- Telemetry Config & Deduplication ---
telemetry:
  primary: "mcp_gateway"
  fallback: "ipc_sdk"
  deduplication:
    enabled: true
    window_ms: 500
    priority: ["mcp_gateway", "lsp_interceptor", "ipc_sdk"]

# --- LSP Protocol Interceptor ---
# Transparent proxy intercept giao thức LSP (JSON-RPC 2.0)
# giữa IDE và Language Server. Thay thế Process Tree Sniffing.
lsp_interceptor:
  enabled: true
  mode: "MONITOR"                # "MONITOR" (chỉ log) | "INTERCEPT" (chặn nguy hiểm)
  listen_port: 9001              # Port cho IDE kết nối (proxy endpoint)
  upstream_host: "127.0.0.1"
  upstream_port: 9002            # Port thật của Language Server phía sau
  block_threshold: 60            # Điểm rủi ro tối thiểu để chặn (khi mode=INTERCEPT)
  dangerous_keywords:            # Từ khóa đáng ngờ trong arguments
    - "payload"
    - "attacker"
    - "malware"
    - "c2."
    - "exfiltrate"
    - "mimikatz"
    - "meterpreter"

# --- Neo4j Graph Database ---
neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "password"

# --- Server Ports ---
ports:
  dashboard: 8888
  ipc_socket: 9999
  attack_web_server: 8080

# --- IPC Server ---
ipc:
  pipe_name: "\\\\.\\pipe\\ai_edr_telemetry"
  buffer_size: 65536
  auth_token: "EDR_SECRET_2026"

# --- NLP / AI Model ---
nlp:
  model_name: "cross-encoder/nli-deberta-v3-small"
  hf_mirror: "https://hf-mirror.com"
  candidate_labels:
    - "remote code execution"
    - "data exfiltration"
    - "prompt injection"
    - "credential access"
    - "privilege escalation"
    - "system discovery"
    - "lateral movement"
    - "benign task"

# --- Correlation Engine ---
correlation:
  time_window_seconds: 30
  max_window_size: 100
  delta_t_threshold: 2.0   # giây — ngưỡng khớp AI Intent ↔ Sysmon Action
  suspicious_cmd_keywords:
    - "curl"
    - "wget"
    - "invoke-webrequest"
    - "iex"
    - "payload"
    - "attacker"
    - "malware"
    - "nc.exe"
    - "certutil"
    - "base64"
    - "-enc"
    - "downloadstring"
    - "bypass"
    - "mimikatz"

# --- Detection Engine ---
detection:
  critical_threshold: 60
  dangerous_keywords:
    - "curl"
    - "wget"
    - "iex"
    - "invoke-webrequest"
    - "payload"
    - "nc.exe"
    - "mimikatz"
    - "certutil"
  allowed_domains:
    - "github.com"
    - "viettel.com.vn"
    - "localhost"
    - "127.0.0.1"
    - "pypi.org"
    - "npm"
    - "microsoft.com"
    - "google.com"

# --- Containment Engine ---
containment:
  mode: "CONTAIN"    # "CONTAIN" = tự động kill | "ALERT" = chỉ cảnh báo
  whitelist_processes:
    - "code.exe"
    - "cursor.exe"
    - "explorer.exe"
    - "svchost.exe"
    - "system"
    - "smss.exe"
    - "csrss.exe"
    - "wininit.exe"
    - "services.exe"
    - "lsass.exe"
    - "winlogon.exe"
    - "python.exe"
    - "pythonw.exe"
    - "conhost.exe"

# --- Whitelist ParentImage (chống False Positive IDE) ---
# Nếu ParentImage chứa bất kỳ pattern nào dưới đây,
# ORPHAN_SUSPICIOUS sẽ KHÔNG được tạo (trừ khi cmdline đặc biệt nguy hiểm).
whitelist_parent_images:
  - "antigravity.exe"
  - "language_server_windows_x64.exe"
  - "code.exe"
  - "cursor.exe"
  - "idea64.exe"
  - "pycharm64.exe"
  - "devenv.exe"
  - "rider64.exe"
  - "webstorm64.exe"
  - "goland64.exe"
  - "copilot.exe"
  - "github desktop.exe"

# --- Sysmon Listener ---
sysmon:
  whitelist_images:
    - "code.exe"
    - "cursor.exe"
    - "chrome.exe"
    - "explorer.exe"
    - "svchost.exe"
    - "msedge.exe"
    - "conhost.exe"

# --- Tool Monitor ---
tool_monitor:
  excessive_limit: 10
  excessive_window_seconds: 30
  mass_enum_limit: 5
  mass_enum_window_seconds: 10

# --- Probabilistic Risk Scoring ---
risk_scoring:
  base_severity:
    powershell: 70
    cmd: 60
    suspicious_keyword: 80
    default_unknown: 20
  context_multiplier:
    external_network: 1.5
    prompt_injection: 1.4
    tool_anomaly: 1.3
    data_disclosure: 1.5
    human_dev_override: 0.3
  confidence_weights:
    time_match: 0.4
    semantic_match: 0.3
    session_match: 0.3

# --- Alert Queue ---
alert_queue:
  directory: "alert_queue"
  max_incidents: 200

# --- Reports ---
reports:
  directory: "reports"
